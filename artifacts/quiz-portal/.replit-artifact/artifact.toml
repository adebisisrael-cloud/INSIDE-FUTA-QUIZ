kind = "web"
previewPath = "/"
title = "Inside FUTA Smart Test Portal"
version = "1.0.0"
id = "artifacts/quiz-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24887

[services.development]
run = "pnpm --filter @workspace/quiz-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quiz-portal", "run", "build" ]
publicDir = "artifacts/quiz-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24887"
BASE_PATH = "/"
